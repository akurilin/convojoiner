[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["tests/data"]

[tool.ruff.lint]
# Default selection is "E, F" — extend with modernization and common-bug rules.
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "W",    # pycodestyle warnings
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
    "UP",   # pyupgrade
    "RUF",  # ruff-specific
]
ignore = [
    "E501",  # Line length is enforced by the formatter; lint shouldn't double up.
    "SIM103", # "Return condition directly" — hurts readability for progressive-return guard clauses.
    "SIM108", # `if/else` -> ternary; ternaries hurt readability for our adapter branches.
]

[tool.ruff.lint.per-file-ignores]
# Fixture files assemble split literals for secret-detection tests; some rules
# (e.g. SIM or UP) would want to collapse them, which defeats the purpose.
"tests/fixtures.py" = ["SIM", "UP"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.12"
check_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_return_any = true
no_implicit_optional = true
exclude = ["tests/data/"]

# Third-party libraries without type stubs we're willing to accept as untyped.
[[tool.mypy.overrides]]
module = ["detect_secrets.*", "markdown.*"]
ignore_missing_imports = true
